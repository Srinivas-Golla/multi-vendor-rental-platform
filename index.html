<!DOCTYPE html>
<html>
<head>
<title>Customer - FleetDesk</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;min-height:100vh;background:linear-gradient(135deg,#020617,#1e40af,#06b6d4)}
.header{color:white;padding:25px;display:flex;gap:18px;align-items:center}
.logo-box{width:80px;height:80px;background:white;color:#1e40af;border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:bold}
.container{display:flex;justify-content:center;padding:30px}
.card{background:white;width:380px;padding:25px;border-radius:24px;box-shadow:0 15px 35px rgba(0,0,0,.3)}
input,select{width:100%;padding:14px;margin:9px 0;border-radius:12px;border:1px solid #ccc}
.btn{width:100%;padding:14px;border:0;border-radius:12px;background:#2563eb;color:white;font-weight:bold;margin-top:8px}
.back{background:#ef4444}
.result-box{margin-top:18px;background:#ecfeff;padding:15px;border-radius:15px}
</style>
</head>
<body>

<div class="header">
  <div class="logo-box">FD</div>
  <div>
    <h1>Customer Module</h1>
    <p>Book your self-drive vehicle</p>
  </div>
</div>

<div class="container">
  <div class="card">
    <h2>Book Vehicle</h2>

    <form onsubmit="bookVehicle(event)">
      <input type="text" id="customerName" placeholder="Customer Name" required>

      <select id="vehicle">
        <option>Swift Car</option>
        <option>Activa Bike</option>
        <option>Innova SUV</option>
      </select>

      <input type="date" id="date" required>
      <input type="number" id="days" placeholder="Number of Days" required>

      <button class="btn" type="submit">Confirm Booking</button>
    </form>

    <div id="bookingResult" class="result-box"></div>

    <button class="btn back-btn" onclick="goBack()">Back Dashboard</button>
  </div>
</div>

<script>
function bookVehicle(event){
   ...
}

function goBack(){
   window.location.href="index.html";
}
  event.preventDefault();

  var name = document.getElementById("customerName").value;
  var vehicle = document.getElementById("vehicle").value;
  var date = document.getElementById("date").value;
  var days = document.getElementById("days").value;

  document.getElementById("bookingResult").innerHTML =
    "<h3>Booking Confirmed</h3>" +
    "<p><b>Name:</b> " + name + "</p>" +
    "<p><b>Vehicle:</b> " + vehicle + "</p>" +
    "<p><b>Date:</b> " + date + "</p>" +
    "<p><b>Days:</b> " + days + "</p>";
}
</script>

</body>
</html>
