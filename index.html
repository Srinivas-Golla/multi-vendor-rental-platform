<!DOCTYPE html>
<html>
<head>
<title>FleetDesk</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#020617,#1e3a8a,#06b6d4);
}

.header{
  color:white;
  padding:28px;
  display:flex;
  align-items:center;
  gap:20px;
}

.logo-box{
  width:100px;
  height:100px;
  background:white;
  color:#1e3a8a;
  border-radius:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  font-weight:bold;
}

.login-container{
  display:flex;
  justify-content:center;
  padding:40px;
}

.login-card{
  background:white;
  width:360px;
  padding:28px;
  border-radius:24px;
  box-shadow:0 20px 40px rgba(0,0,0,.25);
}

input,select{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #d1d5db;
}

.primary-btn,.logout-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-weight:bold;
}

.dashboard-header{
  color:white;
  padding:20px;
}

.module-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding:20px;
}

.module-card{
  background:white;
  color:#111827;
  text-decoration:none;
  padding:26px;
  border-radius:24px;
  text-align:center;
  box-shadow:0 12px 30px rgba(0,0,0,.25);
}

.module-card h3{margin:10px 0 6px}
</style>
</head>

<body>
<div class="header">
  <div class="logo-box">FD</div>
  <div>
    <h1>FleetDesk</h1>
    <p>Multi Vendor Rental Platform</p>
  </div>
</div>

<div id="loginPage" class="login-container">
  <div class="login-card">
    <h2>Login</h2>
    <select id="role">
      <option value="customer">Customer</option>
      <option value="owner">Fleet Owner</option>
      <option value="admin">Admin</option>
    </select>
    <input type="text" id="username" placeholder="Username">
    <input type="tel" id="mobile" placeholder="Mobile Number">
    <button class="primary-btn" onclick="getOtp()">Get OTP</button>

    <div id="otpBox" style="display:none;">
      <input type="text" id="otp" placeholder="Enter OTP">
      <button class="primary-btn" onclick="confirmOtp()">Confirm OTP</button>
      <p id="otpMsg"></p>
    </div>
  </div>
</div>

<div id="dashboard" style="display:none;">
  <div class="dashboard-header">
    <h2 id="dashboardTitle">Dashboard</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div id="customerModules" class="module-grid" style="display:none;">
    <a href="customer.html" class="module-card">👤<h3>Browse Vehicles</h3><p>Search and book vehicles</p></a>
    <a href="booking.html" class="module-card">📅<h3>My Bookings</h3><p>View booking status</p></a>
    <a href="payment.html" class="module-card">💳<h3>Payments</h3><p>Pay invoices</p></a>
  </div>
</div>

<script>
var generatedOtp = "1234";

function getOtp(){
  document.getElementById("otpBox").style.display="block";
  document.getElementById("otpMsg").innerHTML="Demo OTP: 1234";
}

function confirmOtp(){
  if(document.getElementById("otp").value==="1234"){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("dashboard").style.display="block";
    document.getElementById("dashboardTitle").innerHTML="Customer Dashboard";
    document.getElementById("customerModules").style.display="grid";
  }else{
    alert("Invalid OTP");
  }
}

function logout(){
  location.reload();
}
</script>
</body>
</html>
